version: "3.8"

services:
  flask:
    build: .
    image: flask
    container_name: flask-api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_HOST=postgres-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=phone
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - LOG_LEVEL=INFO
